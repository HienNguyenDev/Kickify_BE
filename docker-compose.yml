version: '3.8'

services:
  kickify-api:
    image: kickify-api:${BUILD_NUMBER:-latest}
    container_name: kickify-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Database=${DB_CONNECTION}
      - Authentication__TokenUri=${TOKEN_URI}
      - Authentication__SecretKey=${JWT_SECRET_KEY}
    env_file:
      - /var/lib/jenkins/secrets/.env.production
    networks:
      - kickify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  kickify-network:
    driver: bridge