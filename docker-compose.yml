version: '3.8'

services:
  kickify-api:
    image: kickify-api:${BUILD_NUMBER:-latest}
    container_name: kickify-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    env_file:
      - /var/lib/jenkins/secrets/.env.production
    networks:
      - kickify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  redis:
    image: redis:7-alpine
    container_name: kickify-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    env_file:
      - /var/lib/jenkins/secrets/.env.production
    networks:
      - kickify-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
networks:
  kickify-network:
    driver: bridge
volumes:
  redis-data: